name: UI Regression Tests

on:
  workflow_run:
    workflows: ["Deploy to Staging"]
    types:
      - completed

permissions:
  contents: read
  checks: write

jobs:
  regression:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    env:
      ENV: staging
      BROWSER: ${{ matrix.browser }}
      HEADLESS: true
      TIMEOUT_MS: 10000
      UI_USERNAME: ${{ secrets.UI_USERNAME }}
      UI_PASSWORD: ${{ secrets.UI_PASSWORD }}
      BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}

    steps:
      - name: Checkout deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install $BROWSER
          python -m playwright install-deps $BROWSER

      - name: Run regression tests
        run: |
          mkdir -p reports
          mkdir -p artifacts
          pytest -m "regression" \
            --html=reports/regression-report.html \
            --self-contained-html \
            --junitxml=reports/regression-junit.xml

      - name: Publish Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Regression Results
          path: reports/regression-junit.xml
          reporter: java-junit

      - name: Add regression summary
        if: always()
        run: |
          echo "## Regression Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: STAGING" >> $GITHUB_STEP_SUMMARY
          echo "- Browser: $BROWSER" >> $GITHUB_STEP_SUMMARY
          echo "- Base URL: $BASE_URL" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by workflow: ${{ github.event.workflow_run.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deployed commit: ${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Job status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated outputs" >> $GITHUB_STEP_SUMMARY
          echo "- HTML report artifact: \`regression-report-${{ matrix.browser }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- JUnit file: \`reports/regression-junit.xml\`" >> $GITHUB_STEP_SUMMARY
          echo "- HTML file: \`reports/regression-report.html\`" >> $GITHUB_STEP_SUMMARY
          echo "- Failure artifacts artifact: \`regression-playwright-artifacts-${{ matrix.browser }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact folders: \`artifacts/screenshots\`, \`artifacts/traces\`, \`artifacts/videos\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ matrix.browser }}
          path: reports/

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-playwright-artifacts-${{ matrix.browser }}
          path: artifacts/