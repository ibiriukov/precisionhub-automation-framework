name: UI Smoke Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write

jobs:
  smoke:
    runs-on: ubuntu-latest

    env:
      ENV: dev
      BROWSER: chromium
      HEADLESS: true
      TIMEOUT_MS: 10000
      UI_USERNAME: ${{ secrets.UI_USERNAME }}
      UI_PASSWORD: ${{ secrets.UI_PASSWORD }}
      BASE_URL: ${{ secrets.DEV_BASE_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run smoke tests
        run: |
          mkdir -p reports
          pytest -m "smoke" \
            --html=reports/smoke-report.html \
            --self-contained-html \
            --junitxml=reports/smoke-junit.xml

      - name: Publish Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Smoke Results
          path: reports/smoke-junit.xml
          reporter: java-junit

      - name: Add smoke summary
        if: always()
        run: |
          echo "## Smoke Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: DEV" >> $GITHUB_STEP_SUMMARY
          echo "- Browser: $BROWSER" >> $GITHUB_STEP_SUMMARY
          echo "- Base URL: $BASE_URL" >> $GITHUB_STEP_SUMMARY
          echo "- Event: pull_request" >> $GITHUB_STEP_SUMMARY
          echo "- Job status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated outputs" >> $GITHUB_STEP_SUMMARY
          echo "- HTML report artifact: \`smoke-html-report\`" >> $GITHUB_STEP_SUMMARY
          echo "- JUnit file: \`reports/smoke-junit.xml\`" >> $GITHUB_STEP_SUMMARY
          echo "- HTML file: \`reports/smoke-report.html\`" >> $GITHUB_STEP_SUMMARY
          echo "- Failure artifacts artifact: \`smoke-playwright-artifacts\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-html-report
          path: reports/

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-artifacts
          path: artifacts/