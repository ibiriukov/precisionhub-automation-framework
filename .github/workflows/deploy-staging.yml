name: Deploy to Staging

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    env:
      STAGING_URL: ${{ secrets.STAGING_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Simulate deploy to staging
        run: |
          echo "Deploying build to staging at $STAGING_URL ..."
          echo "Deployment successful."